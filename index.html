<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Berlin — Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #f5f0e8;
      --card:    #fdfaf4;
      --ink:     #1a1410;
      --ink2:    #4a4035;
      --faint:   #c8bfad;
      --border:  #d4c8b0;
      --accent:  #b85c2a;
      --accent2: #2a5c8f;
      --accent3: #3a7a4a;
      --accent4: #7a3a7a;
      --stamp:   #8b3a1e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 20% 20%, rgba(184,92,42,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(42,92,143,0.05) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23a0906a' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: 'IBM Plex Sans', sans-serif;
      padding: 32px 16px;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      width: min(620px, 96vw);
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 1px 0 #fff inset, 4px 4px 0 var(--faint), 8px 8px 0 rgba(0,0,0,0.05);
      padding: 40px 44px 36px;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TOP RULE ── */
    .top-rule { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
    .rule-line { flex: 1; height: 1px; background: var(--border); }
    .rule-diamond { width: 8px; height: 8px; background: var(--accent); transform: rotate(45deg); flex-shrink: 0; }
    .rule-text { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--faint); text-transform: uppercase; }

    /* ── HEADER ── */
    .header { display: flex; gap: 28px; align-items: flex-start; margin-bottom: 32px; }
    .avatar-col { flex-shrink: 0; }
    .avatar-frame { width: 108px; height: 108px; border: 1px solid var(--border); position: relative; background: #ede8df; overflow: hidden; }
    .avatar-frame::before, .avatar-frame::after { content: ''; position: absolute; width: 14px; height: 14px; border-color: var(--accent); border-style: solid; z-index: 2; }
    .avatar-frame::before { top: 4px; left: 4px; border-width: 1px 0 0 1px; }
    .avatar-frame::after  { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }
    .avatar-inner { width: 100%; height: 100%; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; }
    .avatar-inner svg { display: block; }
    .avatar-number { position: absolute; bottom: 0; left: 0; right: 0; background: var(--accent); font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 2px; color: #fff; text-align: center; padding: 3px 0; }
    .name-col { flex: 1; padding-top: 4px; }
    .pre-name { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
    .name { font-family: 'DM Serif Display', serif; font-size: 42px; color: var(--ink); line-height: 1; margin-bottom: 4px; letter-spacing: -0.5px; }
    .name em { font-style: italic; color: var(--accent); }
    .tagline { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--faint); letter-spacing: 2px; margin-bottom: 16px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border: 1px solid; }
    .chip.outline-ink    { border-color: var(--ink); color: var(--ink); }
    .chip.outline-accent { border-color: var(--accent); color: var(--accent); }
    .chip.outline-blue   { border-color: var(--accent2); color: var(--accent2); }
    .chip.outline-green  { border-color: var(--accent3); color: var(--accent3); }
    .chip.outline-purple { border-color: var(--accent4); color: var(--accent4); }
    .chip.filled-accent  { background: var(--accent); color: #fff; border-color: var(--accent); }
    .chip.filled-blue    { background: var(--accent2); color: #fff; border-color: var(--accent2); }

    /* ── SECTION DIVIDER ── */
    .sec-divider { display: flex; align-items: center; gap: 12px; margin: 26px 0 18px; }
    .sec-divider .l { flex: 1; height: 1px; background: var(--border); }
    .sec-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--ink2); text-transform: uppercase; }

    /* ── INFO GRID ── */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; }
    .info-item { border-left: 2px solid var(--border); padding-left: 12px; }
    .info-item.accent-l { border-color: var(--accent); }
    .info-item.blue-l   { border-color: var(--accent2); }
    .info-item.green-l  { border-color: var(--accent3); }
    .info-item.purple-l { border-color: var(--accent4); }
    .info-key { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--faint); margin-bottom: 3px; }
    .info-val { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.4; }

    /* ── STATS ── */
    .stats-row { display: flex; border: 1px solid var(--border); margin-top: 4px; }
    .stat-cell { flex: 1; padding: 14px 12px; border-right: 1px solid var(--border); }
    .stat-cell:last-child { border-right: none; }
    .stat-key { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--faint); margin-bottom: 6px; }
    .stat-bar-track { height: 3px; background: var(--border); margin-bottom: 6px; overflow: hidden; }
    .stat-bar-fill { height: 100%; width: 0; transition: width 1.2s cubic-bezier(0.22,1,0.36,1); }
    .stat-bar-fill.a { background: var(--accent); }
    .stat-bar-fill.b { background: var(--accent2); }
    .stat-bar-fill.c { background: var(--ink); }
    .stat-bar-fill.d { background: var(--accent3); }
    .stat-bar-fill.e { background: var(--accent4); }
    .stat-pct { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 500; color: var(--ink); line-height: 1; }
    .stat-pct span { font-size: 10px; color: var(--faint); font-weight: 300; }

    /* ── SKILLS ── */
    .skills-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .skill-tag { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 1.5px; padding: 4px 10px; background: rgba(42,92,143,0.07); border: 1px solid rgba(42,92,143,0.2); color: var(--accent2); }
    .skill-tag.green { background: rgba(58,122,74,0.07); border-color: rgba(58,122,74,0.25); color: var(--accent3); }
    .skill-tag.orange { background: rgba(184,92,42,0.07); border-color: rgba(184,92,42,0.25); color: var(--accent); }

    /* ── GAME LIST ── */
    .game-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .game-item { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border: 1px solid var(--border); background: rgba(184,92,42,0.02); }
    .game-dot { width: 6px; height: 6px; background: var(--accent); transform: rotate(45deg); flex-shrink: 0; }
    .game-name { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink); }
    .game-badge { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 8px; padding: 2px 6px; border: 1px solid; white-space: nowrap; }
    .game-badge.rank-a { color: var(--accent); border-color: var(--accent); }
    .game-badge.rank-b { color: var(--accent2); border-color: var(--accent2); }
    .game-badge.rank-c { color: var(--accent3); border-color: var(--accent3); }

    /* ── TIMELINE (Riwayat Pendidikan) ── */
    .timeline { position: relative; padding-left: 20px; display: flex; flex-direction: column; gap: 18px; }
    .timeline::before { content: ''; position: absolute; left: 4px; top: 6px; bottom: 6px; width: 1px; background: var(--border); }
    .tl-item { position: relative; }
    .tl-dot { position: absolute; left: -20px; top: 4px; width: 9px; height: 9px; border: 2px solid var(--accent); background: var(--card); }
    .tl-dot.filled { background: var(--accent); }
    .tl-dot.blue { border-color: var(--accent2); background: var(--accent2); }
    .tl-dot.green { border-color: var(--accent3); background: var(--accent3); }
    .tl-year { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--faint); margin-bottom: 2px; }
    .tl-title { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--ink); }
    .tl-sub { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink2); margin-top: 1px; }
    .tl-note { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; color: var(--faint); margin-top: 3px; font-style: italic; }

    /* ── ORGANISASI / PENGALAMAN ── */
    .org-list { display: flex; flex-direction: column; gap: 10px; }
    .org-item { display: flex; gap: 14px; align-items: flex-start; padding: 12px; border: 1px solid var(--border); }
    .org-year-col { flex-shrink: 0; }
    .org-year { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 1px; color: var(--faint); white-space: nowrap; }
    .org-title { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
    .org-role { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--accent2); }
    .org-desc { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; color: var(--ink2); margin-top: 4px; line-height: 1.5; }

    /* ── PROYEK ── */
    .proj-list { display: flex; flex-direction: column; gap: 10px; }
    .proj-item { padding: 14px; border: 1px solid var(--border); position: relative; overflow: hidden; }
    .proj-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
    .proj-item.p-a::before { background: var(--accent); }
    .proj-item.p-b::before { background: var(--accent2); }
    .proj-item.p-c::before { background: var(--accent3); }
    .proj-item.p-d::before { background: var(--accent4); }
    .proj-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .proj-name { font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--ink); }
    .proj-status { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 1.5px; padding: 2px 7px; border: 1px solid; flex-shrink: 0; }
    .proj-status.done { color: var(--accent3); border-color: var(--accent3); }
    .proj-status.ongoing { color: var(--accent); border-color: var(--accent); }
    .proj-status.plan { color: var(--faint); border-color: var(--faint); }
    .proj-stack { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
    .proj-tag { font-family: 'IBM Plex Mono', monospace; font-size: 8px; padding: 2px 6px; background: rgba(0,0,0,0.04); border: 1px solid var(--border); color: var(--ink2); }
    .proj-desc { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; color: var(--ink2); line-height: 1.55; }

    /* ── FAVORIT ── */
    .fav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .fav-card { border: 1px solid var(--border); padding: 12px 14px; }
    .fav-cat { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--faint); margin-bottom: 8px; }
    .fav-list-items { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .fav-list-items li { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; color: var(--ink); display: flex; align-items: center; gap: 7px; }
    .fav-list-items li::before { content: ''; width: 4px; height: 4px; background: var(--accent); transform: rotate(45deg); flex-shrink: 0; }
    .fav-list-items li span { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--faint); margin-left: auto; }

    /* ── JADWAL HARIAN ── */
    .schedule-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); }
    .sched-row { display: flex; align-items: center; gap: 0; border-bottom: 1px solid var(--border); }
    .sched-row:last-child { border-bottom: none; }
    .sched-time { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--accent); padding: 9px 14px; border-right: 1px solid var(--border); width: 80px; flex-shrink: 0; background: rgba(184,92,42,0.03); }
    .sched-act { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; color: var(--ink); padding: 9px 14px; flex: 1; }
    .sched-emoji { padding: 9px 12px 9px 0; font-size: 14px; }

    /* ── BUCKET LIST ── */
    .bucket-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .bucket-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); }
    .bucket-check { width: 16px; height: 16px; border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
    .bucket-check.done { border-color: var(--accent3); background: var(--accent3); }
    .bucket-check.done::after { content: '✓'; color: #fff; font-size: 9px; line-height: 1; }
    .bucket-text { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; color: var(--ink); line-height: 1.45; }
    .bucket-text.crossed { color: var(--faint); text-decoration: line-through; }

    /* ── FAKTA UNIK ── */
    .facts-list { display: flex; flex-direction: column; gap: 8px; }
    .fact-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 14px; background: rgba(0,0,0,0.02); border-left: 2px solid var(--border); }
    .fact-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent); font-weight: 500; flex-shrink: 0; width: 20px; }
    .fact-text { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; color: var(--ink2); line-height: 1.55; }

    /* ── PERSONALITY DOTS ── */
    .personality-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .pers-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .pers-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 1px; color: var(--ink2); white-space: nowrap; }
    .pers-dots { display: flex; gap: 3px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; border: 1px solid var(--border); background: transparent; }
    .dot.filled-a { background: var(--accent); border-color: var(--accent); }
    .dot.filled-b { background: var(--accent2); border-color: var(--accent2); }
    .dot.filled-c { background: var(--accent3); border-color: var(--accent3); }
    .dot.filled-d { background: var(--accent4); border-color: var(--accent4); }

    /* ── CONTACT ROW ── */
    .contact-row { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid var(--border); margin-top: 4px; }
    .contact-cell { padding: 12px 14px; border-right: 1px solid var(--border); }
    .contact-cell:last-child { border-right: none; }
    .contact-key { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--faint); margin-bottom: 4px; }
    .contact-val { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink); word-break: break-all; }

    /* ── QUOTE BLOCK ── */
    .quote-block { border-left: 3px solid var(--accent); padding: 10px 16px; background: rgba(184,92,42,0.04); }
    .quote-text { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 14px; color: var(--ink2); line-height: 1.6; }
    .quote-attr { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--faint); margin-top: 6px; }

    /* ── GOAL STRIP ── */
    .goal-strip { background: var(--ink); color: #fff; padding: 13px 18px; display: flex; align-items: center; gap: 16px; }
    .goal-label { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 3px; color: var(--faint); text-transform: uppercase; white-space: nowrap; }
    .goal-text { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 13px; color: #fdfaf4; flex: 1; line-height: 1.45; }

    /* ── MBTI BOX ── */
    .mbti-box { display: grid; grid-template-columns: auto 1fr; gap: 0; border: 1px solid var(--border); overflow: hidden; }
    .mbti-letters { background: var(--ink); padding: 20px 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .mbti-big { font-family: 'DM Serif Display', serif; font-size: 36px; color: var(--accent); line-height: 1; letter-spacing: 4px; }
    .mbti-sub { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 2px; color: var(--faint); margin-top: 4px; text-transform: uppercase; }
    .mbti-detail { padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }
    .mbti-trait { display: flex; flex-direction: column; gap: 3px; }
    .mbti-trait-label { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 2px; color: var(--faint); text-transform: uppercase; }
    .mbti-trait-bar { height: 2px; background: var(--border); overflow: hidden; }
    .mbti-trait-fill { height: 100%; }
    .mbti-trait-fill.i { background: var(--accent); width: 78%; }
    .mbti-trait-fill.n { background: var(--accent2); width: 65%; }
    .mbti-trait-fill.f { background: var(--accent4); width: 58%; }
    .mbti-trait-fill.j { background: var(--accent3); width: 72%; }

    /* ── HARAPAN HIDUP ── */
    .hope-grid { display: flex; flex-direction: column; gap: 8px; }
    .hope-item { display: flex; gap: 12px; align-items: center; padding: 10px 14px; border: 1px solid var(--border); }
    .hope-num { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--border); font-style: italic; flex-shrink: 0; width: 28px; line-height: 1; }
    .hope-text { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; color: var(--ink); line-height: 1.5; flex: 1; }
    .hope-tag { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 1px; padding: 2px 7px; background: rgba(184,92,42,0.08); color: var(--accent); border: 1px solid rgba(184,92,42,0.2); white-space: nowrap; }

    /* ── FOOTER ── */
    .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding-top: 18px; border-top: 1px solid var(--border); }
    .footer-id { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--faint); }
    .stamp { width: 62px; height: 62px; border: 2px solid var(--stamp); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: rotat
